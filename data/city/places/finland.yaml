      nature: Westend sits on a Baltic Sea peninsula with immediate shoreline access, two EU 'Excellent'-rated beaches with summer lifeguards (Westend Beach and Haukilahti Beach), the wooded Toppelund forest with seaside trails adjacent in Haukilahti, and Nuuksio National Park (55 km² of lakes and forest) a 20…
    sources: [ "Tilastokeskus", "Etuovi", "Oikotie", "OECD PISA Finland", "Espoo.fi", "Aalto University" ]
  - id: turku-nummi
