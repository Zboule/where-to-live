      education: Kulosaari offers a strong public primary school with Finnish-English bilingual and A1/A2/B1 language options, and KSYK secondary school is one of Finland's top lukios with a full IB Diploma Programme and ~40 nationalities among its student body — but KSYK is a privately-run school with competitiv…
      safe_independence: Finland's first bicycle street and the new Eastern Baana express cycle highway run through the island, Helsinki recorded zero road deaths in 2022–2023, and Finnish children have the highest independent mobility internationally — but the Itäväylä motorway cuts across the northern edge of the islan…
      mental_health: "Finland provides strong structural supports: statutory school psychologist and counsellor ratios (since Aug 2023), the KiVa anti-bullying programme, a new mobile-phone ban during lessons, very low homework loads, and no standardised testing before age 18 — but the youth suicide rate (10.5 per 100…"
      peer_environment: The district is highly educated (67% tertiary degrees) with above-average household incomes and a notable Swedish-speaking minority alongside ~40 nationalities at KSYK, giving it genuine linguistic breadth — but the child-age population is strikingly small (only 10.6% aged 7–15 and 7.1% aged 0–6)…
      family_practicality: A well-sized municipal daycare with integrated pre-primary groups and an Alepa supermarket serve daily needs on the island, and the metro reaches central Helsinki in about 10 minutes — but there is no pharmacy, no health centre, and no medical facility of any kind in Kulosaari itself, pushing all…
      health: Air quality is excellent (PM2.5 consistently 3–7 µg/m³, NO₂ 3.8–6 µg/m³), tap water meets health standards in 99.98% of samples, and the district was developed as a garden suburb with no industrial legacy — but the Itäväylä highway generates noise and localised pollution along the northern edge, …
      nature: Surrounded by the Baltic Sea with waterfront paths on all sides, Kulosaari contains the Kivinokka peninsula — a large outdoor area with a sandy child-friendly beach, accessible nature trail, birdwatching tower, and kayak rental — and the Vanhankaupunginlahti Natura 2000 reserve lies directly acro…
    sources: [ "asuntojenhinnat.fi", "Etuovi", "Oikotie", "ksyk.fi", "ishelsinki.fi", "hel.fi" ]

  - id: helsinki-westend-espoo
