      mental_health: "Denmark ranks #2 globally for child well-being (UNICEF 2025), Danish 15-year-olds report above-average life satisfaction (7.19/10, 6th of 31 OECD countries), and the country's ethos of no homework before roughly age 11 and play-centred early education is a genuine protective factor — but Denmark …"
      peer_environment: Gentofte combines roughly 60 sports clubs and a large organised-activity ecosystem with extreme income concentration — the Gini coefficient of 0.51 is among the highest in the Nordic countries, 43% of residents fall in the top national income decile, and the middle class is about half the size of…
      family_practicality: "Denmark's world-leading e-government infrastructure (ranked #1 globally in the UN E-Government Survey four consecutive times) combines with Gentofte's statutory childcare guarantee — families who book two months ahead are guaranteed a place — and a ~10–15 minute S-train commute to central Copenha…"
      health: Gentofte's municipal health-visiting service is exceptionally well-qualified — 20 health visitors including three IBCLC-certified lactation consultants and five Marte Meo-trained practitioners, with systematic child health checks from birth through 8th grade — and Copenhagen's PM2.5 of ~9.6 µg/m³…
      nature: Gentofte's crown jewel is direct adjacency to Jægersborg Dyrehave — a UNESCO World Heritage royal deer park and ancient forest with free-roaming deer and an extensive trail network — complemented by 22 municipal parks, 10 nature reserves and bogs, and three public beaches on the Øresund coast wit…
    sources: [ "Boliga", "Boligsiden", "Finans Danmark", "Gentofte Kommune", "OECD PISA 2022", "IQAir", "VORES Hellerup" ]
