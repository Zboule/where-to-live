    notes:
      education: The Lycée Français Prins Henrik sits right in the district offering a full French-Danish bilingual curriculum from preschool through lycée — a near-perfect fit for a French-speaking family — with Copenhagen International School's IB continuum reachable in ~20 minutes by metro. Public primary scho…
      safe_independence: Copenhagen's segregated cycleways and pedestrian infrastructure are world-class, and Frederiksberg's overall crime has dropped 24% in a decade, but reckless driving tops resident concerns at 37% and specific locations (Frederiksberg Station, Lindevangsparken, Fuglebakken) are flagged as uneasy at…
      mental_health: "Denmark ranks #2 in UNICEF's child well-being index and the early-years approach — no homework until ~11, play-based learning — is genuinely humane, yet the country also posts the highest adolescent alcohol use rate in Europe (90% of 15–16 year-olds have consumed alcohol), 94% of children have so…"
      peer_environment: Frederiksberg is one of Denmark's wealthiest and most educated municipalities — 45% hold university degrees — with eight youth leisure clubs and a formal integration policy, but this creates an economically homogeneous bubble (only 12% social housing, just 14% vocational training) and the data sh…
      family_practicality: "Denmark's UN-ranked #1 e-government platform and its guaranteed, 75%-subsidised childcare from six months are standout strengths, but the essential public-services portal Borger.dk operates primarily in Danish and the CPR number prerequisite creates a chicken-and-egg problem for newly arrived fam…"
      health: Annual PM2.5 averages 7.1 µg/m³ — a steady four-year improving trend but still 1.4× the WHO guideline — and Danish tap water is microbiologically excellent, yet over half the country's drinking-water boreholes contain pesticide residues; Frederiksberg Hospital within the district is primarily a p…
      nature: Frederiksberg Have's 31 hectares of English-style gardens with canals, lakes, and woodlands anchor the district alongside the adjacent Søndermarken, while Amager Strandpark's 4.6 km of beaches and the 3,500-hectare Amager Nature Park are reachable within 15–20 minutes by metro — the main limitati…
    sources: [ "Boliga", "Boligsiden", "Finans Danmark", "OECD PISA 2022", "Numbeo", "Euronews teen wellbeing", "Cycling Embassy of Denmark" ]

