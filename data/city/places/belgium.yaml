  - id: brussels-woluwe-saint-pierre
    city: Brussels
    country: Belgium
    country_code: BE
    district: Woluwe-Saint-Pierre
    blurb: "Greenest, safest Brussels commune; Metro Line 1, top-educated peers, EU-quarter under 20 min."
    price_per_sqm: { lower: 3060, upper: 5050, average: 4000 }
    travel: { paris_hours: 3.0, paris_mode: train, yerevan_hours: 11, yerevan_mode: flight }
    scores: { education: 4, safe_independence: 3.5, mental_health: 3, peer_environment: 3.5, family_practicality: 4, health: 3.5, nature: 4 }
    notes:
      education: Woluwe-Saint-Pierre offers the IB Diploma Programme at Agnes School right on Avenue Père Damien and free, well-resourced Francophone public schooling through Athénée Royal Crommelynck, with CESS and IB both granting direct Belgian university access. However, Belgium's rigid age-12 academic tracki…
      safe_independence: The Brussels-wide City 30 limit calms nearly all local streets, a school street closes to cars at drop-off and pick-up times on Avenue des Éperviers, and Metro Line 1 stations at Tomberg, Roodebeek, Vandervelde, and Stockel give teens solid transit autonomy for daytime independence. The trade-off…
      mental_health: The commune benefits from Belgium's free, school-embedded CLB/PMS psychological support service, a smartphone ban in Francophone primary and lower secondary schools starting in 2024–2025, and relatively low fear of failure among Flemish 15-year-olds compared to English peers. Worryingly, HBSC 202…
      peer_environment: Families here are highly educated, median incomes sit well above the Brussels average, and 37% of residents are foreign nationals drawn from EU-14, British, and Japanese expat communities, with SportCity's Olympic pool, Mini Gym (ages 5–7), and Basic Gym (ages 8–14) providing visible organised yo…
      family_practicality: A 3–4 minute Metro Line 1 ride from Montgomery to Schuman puts the EU quarter within an exceptionally short commute, the Woluwe Shopping Center and Stockel retail area sit at the commune's edges for everyday errands, and EU citizens face straightforward residence registration with Belgium's top-1…
      health: Cliniques universitaires Saint-Luc — a top-tier Belgian university hospital with a full paediatric department and paediatric ER — sits just across the commune boundary in adjacent Woluwe-Saint-Lambert, and Belgian tap water comfortably meets EU standards with PFAS levels well below the 2026 100 n…
      nature: Woluwe Park's ~70 hectares of English-style parkland with 180 tree species, three ponds, a playground, and 24/7 free access sits directly within the commune, and the 4,400-hectare Sonian Forest — a UNESCO-listed ancient beech woodland with deer and miles of hiking trails — begins just minutes awa…
    sources: [ "IBSA", "Statbel", "immoweb", "CurieuzenAir", "OECD/PISA", "Eurostar" ]

  - id: ghent-centre
    city: Ghent
    country: Belgium
    country_code: BE
    district: Ghent Centre
    blurb: "Belgium's largest car-free core; kids genuinely bike/tram independently; pricier, denser, apartment living."
    price_per_sqm: { lower: 3000, upper: 4800, average: 3700 }
    travel: { paris_hours: 3.7, paris_mode: train, yerevan_hours: 12, yerevan_mode: flight }
    scores: { education: 3.5, safe_independence: 4.5, mental_health: 3, peer_environment: 3, family_practicality: 3.5, health: 3, nature: 2.5 }
    notes:
      education: Ghent's Flemish public schools benefit from a system that ranks well internationally and offers direct university access via the CESS or Flemish secondary degree, with the International School of Ghent providing an IB backup — but early rigid tracking at age 12 into a 'cascade system' that mostly…
      safe_independence: Ghent's 2017 Circulation Plan transformed the centre into one of Europe's best environments for child autonomous mobility, with extensive 30 km/h zones, car-free squares, school streets, and one of Belgium's densest segregated cycleway networks — kids commonly bike to school alone from around age…
