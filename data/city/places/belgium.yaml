      peer_environment: Ghent offers a rich landscape of organised activities — sports clubs, music schools, Scouts en Gidsen Vlaanderen, and cultural youth programmes — with kids visibly cycling and playing across the city, but the Centre's character is shaped by a large student and transient rental population that dil…
      family_practicality: Ghent Centre is compact and walkable with bakeries, supermarkets, pharmacies, GP practices, and city hall all within walking distance, while Gent-Sint-Pieters station connects to Brussels in ~30 minutes and De Lijn trams and buses provide frequent local transit — a commuter-friendly setup. EU cit…
      health: UZ Gent, one of Belgium's largest university hospitals, provides a full paediatric department and 24/7 emergency care within the city, and Ghent's tap water meets EU Drinking Water Directive standards with PFAS levels (18 ng/L) well below the upcoming 100 ng/L EU limit — but TFA, a 'mini-PFAS', w…
      nature: Citadelpark (~10 hectares) and Muinkpark sit at the southern edge of the centre within walking distance, while Bourgoyen-Ossemeersen nature reserve and the Blaarmeersen recreation area with monitored swimming water are a short bike or bus ride away — but the historic core itself is dense cobblest…
    sources: [ "Immoweb", "Statbel", "Stad Gent/ECF", "OECD/PISA", "IQAir/EEA", "Sciensano" ]

  - id: leuven-centre
