      mental_health: Sweden's structural supports are strong on paper — free school health teams with nurses, counsellors, and psychologists are legally mandated, a national mobile-phone ban in compulsory schools takes effect July 2026, and national screen-time guidelines were issued in 2024 — but outcomes tell a ble…
      peer_environment: Danderyd offers exceptionally rich organised activities — football, ice hockey, tennis, free public skating at three locations, and a dense sports infrastructure — with among the lowest perceived insecurity and victimisation rates in the Stockholm region. But the district is academically document…
      family_practicality: Preschool and after-school care quality is excellent, with 94–98% of parents reporting their child thrives and a 4-month placement guarantee under Swedish law, while the Red Line metro provides a ~15-minute commute to central Stockholm. The 4-month guarantee only secures a place somewhere — not n…
      health: Danderyd has a major acute-care hospital with the Astrid Lindgren Children's Hospital on-site and air quality within WHO guidelines (PM2.5 2.8–4.2 µg/m³), but the E18 motorway cuts through the municipality carrying ~80,000 vehicles per day, creating a noise and pollution corridor where PM10 from …
      nature: "Danderyd ranks #1 in Stockholm County for outdoor recreation, anchored by the 301-hectare Rinkebyskogen nature reserve (protected 2023) with marked hiking and MTB trails, 15 km of water frontage along Edsviken, and six official swimming spots — a genuinely strong nature offering for a Stockholm s…"
    sources: [ "Svensk Maklarstatistik", "Booli", "Skolverket", "danderyd.se", "SCB", "Newsworthy" ]

  - id: stockholm-ostermalm
