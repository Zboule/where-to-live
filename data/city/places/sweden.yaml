      peer_environment: Östermalm is Stockholm's most affluent district (per-capita income ~20% above national average) with low apparent antisocial behaviour, anchored by Östermalms IP sports ground and Humlegården's playground and skate ramp — but the district is explicitly identified in academic research as part of S…
      family_practicality: Östermalm is a dense, transit-rich central district where everyday services are within walking distance and most government e-services are available in English — but popular förskolor have extreme waitlists (some requiring application on the child's birth day), the 4-month legal placement guarant…
      health: Östermalm's air quality is good by European standards (PM2.5 ~9–10 µg/m³) and Sweden's premier paediatric hospital (Astrid Lindgren) is a 15–20 minute journey away, with tap water among the world's cleanest — but PM2.5 runs nearly double the WHO 2021 guideline, major traffic arteries likely produ…
      nature: Djurgården — the world's first national city park — sits adjacent to Östermalm offering vast forests, meadows, waterfront swimming, and stroller-friendly trails, complemented by the 9-hectare Humlegården with its playground, skate ramp, and year-round amenities — but the district itself is dense …
    sources: [ "Svensk Maklarstatistik", "Hemnet", "OECD PISA 2022", "Numbeo", "US State Dept", "Visit Stockholm" ]
