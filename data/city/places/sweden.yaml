  - id: stockholm-danderyd
    city: Stockholm
    country: Sweden
    country_code: SE
    district: Danderyd
    blurb: "Sweden's richest, top-school municipality: leafy villa enclaves, low tax, metro and Roslagsbanan into Stockholm."
    price_per_sqm: { lower: 6760, upper: 10908, average: 7800 }
    travel: { paris_hours: 5, paris_mode: flight, yerevan_hours: 11, yerevan_mode: flight }
    scores: { education: 4, safe_independence: 3, mental_health: 2.5, peer_environment: 3.5, family_practicality: 4, health: 3, nature: 3.5 }
    notes:
      education: Danderyd delivers Sweden's highest academic results (meritvärde 265/320) and hosts two international schools in-district — the British International School of Stockholm (IGCSE + IB Diploma, ages 3–18) and Internationella Engelska Skolan (Cambridge IGCSE, tuition-free) — making it one of Sweden's …
