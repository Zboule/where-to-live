      health: Limpertsberg's standout asset is the CHL Kannerklinik paediatric hospital with 24/7 emergency department reachable in 10–18 minutes on foot from most of the district, and drinking water ranks third-cleanest in the EU, but the hospital carries a 2.3/5 rating with parents reporting 3–11 hour ER wai…
