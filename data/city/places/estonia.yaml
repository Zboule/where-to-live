    notes:
      education: Estonia's national school system posts top-tier PISA scores and Pirita's own Majandusgümnaasium is well-regarded, giving the district a solid public-school baseline. However, only 5 IB Diploma schools exist in the entire country (2 of them municipal/free), teacher attrition runs ~40–50% within fi…
      safe_independence: Pirita is a low-density suburb where children can walk and bike along a coastal promenade and pine-forest trails, and multiple bus routes deliver ~14 departures per hour to central Tallinn in 14–23 minutes — free for all registered residents. The gap is that Pirita is entirely bus-dependent with …
      mental_health: "Estonian teens report above-OECD-average life satisfaction, self-efficacy, and sense of belonging, and Tallinn schools increasingly have psychologists on staff, but the other side of the picture is stark: Estonia ranks 41st out of 44 HBSC countries on a depression-risk composite, 33.6% of 15-year…"
      peer_environment: Pirita is Tallinn's highest-income district, with above-average incidence of higher education and meaningful ethnic diversity (~28.5% non-Estonian), which creates a stable, aspirational peer pool. The main structural concern is Estonia's deep linguistic segregation — separate Estonian and Russian…
      family_practicality: "A parent commuting to central Tallinn can reach Viru keskus in 14–23 minutes on high-frequency, free buses, and Estonia's #2 global e-government ranking means almost all administrative tasks are done online. The friction points are that Pirita has no rail link (buses get caught in Pirita tee traf…"
      health: Tallinn's PM2.5 sits below the WHO guideline of 5 µg/m³, 99.4% of public-water connections meet all quality standards, and Pirita itself is a quiet residential area with no industrial hazards. The practical drawbacks are that no hospital is located within the district (15–20 minutes to an ER), wi…
      nature: Pirita combines a 2 km Blue Flag beach on the Baltic Sea, extensive pine forests threaded with trails, the Pirita River Valley green corridor, and the 100+ hectare Tallinn Botanic Garden — all inside the district boundary. The trade-offs are that the beach is crowded (up to 30,000 visitors on sum…
    sources: [ "Investropa", "Baltic Times/Volta Quarter (Pirita 5,599/sqm 2024)", "Realting", "Numbeo", "OECD PISA 2022", "FlightsFrom" ]
