    district: Kadriorg
    blurb: "Elegant parkside district by Europe's top-PISA schools; affordable vs the West, dark winters the trade-off."
    price_per_sqm: { lower: 4000, upper: 7000, average: 4500 }
    travel: { paris_hours: 5.5, paris_mode: flight, yerevan_hours: 11.5, yerevan_mode: flight }
    scores: { education: 3.5, safe_independence: 3.5, mental_health: 2, peer_environment: 3.5, family_practicality: 3, health: 4, nature: 4 }
    notes:
      education: "Estonia ranks #1 in Europe on PISA 2022 across all subjects, and Kadriorg's own Kadrioru Saksa Gümnaasium (grades 1–12) offers intensive German from grade 1 with DSD certification — a rare and valuable bilingual pathway. The International School of Estonia (full IB continuum PYP–MYP–DP, ~2 km awa…"
      safe_independence: Kadriorg is one of Tallinn's safest districts (rated 4.7/5 overall, with excellent night walking safety), and trams 1 and 3 connect it to the city centre in ~6 minutes every 6–10 minutes at peak, while Kadriorg Park's ~16 km of paved pathways offer car-free mobility within the neighbourhood. Gaps…
      mental_health: "Estonian 15-year-olds score above the OECD average on life satisfaction (6.91/10) and sense of belonging, but the flipside is stark: Estonia ranks 41st out of 44 HBSC countries on a depression-risk composite, 29% of pupils feel depressed weekly, 36% of 15-year-old girls report loneliness 'most of…"
      peer_environment: Kadriorg and neighbouring Pirita post the highest average earnings in Estonia (~€1,933/month gross) with above-average levels of higher education, and the district is notably absent from Tallinn's vandalism and antisocial-behaviour hot-spot reports — the playground in Kadriorg Park is a well-used…
      family_practicality: "Estonia ranks #2 globally on the UN E-Government Development Index and Tallinn's tram puts Kadriorg ~6 minutes from the city centre, with NOP organic grocery and several supermarkets (Maxima, Prisma, Selver) within walking distance. The friction is real: Tallinn is in a systemic childcare crisis …"
      health: Tallinn's air ranks among Europe's cleanest 13 cities (Kesklinn NO₂ annual average just 10.62 µg/m³ in 2024, well below the EU limit), Kadriorg's residential streets are consistently described as quiet and leafy, and 99.4% of public drinking water meets all quality standards — the district has be…
      nature: Kadriorg Park is a 70-hectare baroque park with ~16 km of paved walking and cycling paths directly within the district — one of Tallinn's largest and most beautiful green spaces, with the Baltic Sea coast at the northern edge and Pirita beach a short distance beyond. It is well-maintained, public…
    sources: [ "Investropa", "Realting", "Global Property Guide", "Numbeo", "OECD PISA 2022", "airBaltic/prokerala" ]

  - id: tallinn-pirita
    city: Tallinn
