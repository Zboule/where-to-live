      education: Cascais offers a solid public school system with national curriculum standards and the standout St. Dominic's International School delivering the full IB continuum from ages 3–18, plus King's College with a Cambridge/bilingual programme pursuing IB candidacy — together they provide strong interna…
      safe_independence: Cascais is very safe from a crime perspective (Numbeo crime index 22, rated 'very safe' at 85/100) with active 30 km/h zones and physical traffic calming gaining ~80% resident support, and the Linha de Cascais train provides punctual daytime service every 20–30 minutes to Lisbon. The critical gap…
      mental_health: Portugal ranks 4th overall and 2nd in mental well-being among 43 OECD/EU countries for children (UNICEF Innocenti Report Card 19), the school psychologist-to-student ratio has improved from 1:1,282 to 1:744, a new Decree-Law bans smartphones for grades 1–6 starting the 2025/26 school year, and mo…
      peer_environment: Cascais has above-average GDP per capita (~$19,750), 40+ nationalities and ~15% foreign residents creating demographic diversity on paper, and a genuinely good municipal youth programme (Cascais Jovem) offering 24h study rooms, training workshops, international exchanges, and clinical psychology …
      family_practicality: The Linha de Cascais train delivers a reliable ~40-minute commute to Lisbon Cais do Sodré every 20–30 minutes during daytime, the gov.pt portal aggregates public services with a virtual assistant in 12 languages including English, and CascaisShopping plus municipal Lojas de Cascais one-stop servi…
      health: Hospital de Cascais Dr. José de Almeida is a modern Level II public hospital with a dedicated paediatrics department, neonatal unit, and English-speaking staff consistently praised as professional and competent; NO₂ and SO₂ levels are well below WHO guidelines, and Portugal's drinking water achie…
