    notes:
      education: "Dejvice/Bubeneč offers an exceptional concentration of elite schooling: the International School of Prague and Riverside School both deliver the full IB continuum with diploma averages of 34–36 (well above the global ~30), while Gymnázium Jana Keplera is one of Czechia's most prestigious academic…"
      safe_independence: Crime is very low (Numbeo Safety Index 75.31, 'Very Low' worry about mugging) and Prague's public transport is among Europe's best, with Dejvická metro (Line A) and multiple tram lines giving teens easy solo mobility across the city, supported by three school streets in P6 with strong resident ap…
      mental_health: The Czech school system places heavy academic pressure on children — perceived school pressure hit its highest level ever recorded in 2022, three in ten Czech children dislike school due to excessive exams and grading, and school satisfaction has declined over three decades — while the profession…
      peer_environment: Dejvice has been Prague's most educationally elite cadastral area since at least 1980 — it is a villa and embassy district catering to the educated upper-middle class, with rich organised activities including SK Aritma Praha (~1,100 youth members across six sports) and ZUŠ Jana Hanuše (870 arts p…
      family_practicality: Dejvická metro and multiple tram lines give fast, reliable commutes across Prague, the Vítězné náměstí area has everyday shops and services in walking distance, and recent legal changes (August 2024 digitisation law, July 2024 labour-market opening for nine countries) are improving the administra…
      health: Tap water is among the best in the world, FN Motol University Hospital (the largest medical facility in Czechia, ~5–6 km away) provides comprehensive care including paediatrics, and ÚVN military hospital in neighbouring Střešovice (~2 km) offers an after-hours paediatric clinic on weeknights and …
      nature: Divoká Šárka, a 253-hectare nature reserve with dramatic silica cliffs, deep forested valley, and natural swimming (U Veselíků spring-fed pool, Džbán reservoir), sits entirely within Praha 6's boundaries, while Stromovka — a ~95-hectare former royal hunting park with renewed paths, water features…
    sources: [ "Investropa Prague 2025", "Svoboda & Williams P6", "Wikipedia Prague 6", "ECB CZK/EUR 2025 (~0.0405)", "OECD PISA 2022", "FlightsFrom PRG-EVN" ]
