    notes:
      education: Local public schools in Cotroceni's Sector 5 underperform (gimnazial averages of 4.83 and 3.73 on the 2024 National Evaluation), and no Cotroceni-specific primary appears in any quality ranking. Bucharest's elite state lyceums — Tudor Vianu (BAC avg 9.42), Sf. Sava (9.39), Gheorghe Lazăr (9.41) —…
      safe_independence: Cotroceni's tree-lined residential streets, wide setbacks, and limited through-traffic create a physically walkable neighborhood that ranks among Bucharest's safest, but Romania has the highest road death rate in the EU, Bucharest ranks 34th out of 36 European cities for child-friendly mobility, …
      mental_health: UNICEF's Innocenti Report Card 19 ranks Romania 5th out of 36 high-income countries on the mental health domain, a new ministerial order (December 2025) caps homework at 1–2 hours per day and bans holiday homework, and 83% of Romanian students report making friends easily at school. However, only…
      peer_environment: Cotroceni is an upper-middle-class enclave home to academics, doctors, embassy staff, and cultural figures — Carol Davila University of Medicine sits within the neighborhood — creating a stable, education-valuing peer demographic in a universally described quiet and calm atmosphere. The annual Co…
      family_practicality: Metro M3 serves Cotroceni's eastern edge at Eroilor station — Bucharest's fastest and most reliable transit — and AFI Cotroceni, Romania's largest mall with 300+ stores, an Auchan hypermarket, pharmacy, and cinema, sits within the neighborhood alongside a Carrefour Express at One Cotroceni Park. …
      health: Two major pediatric emergency hospitals serve Bucharest — Marie Curie (500+ beds, all specialties, including a new €53M family-friendly wing opened April 2024) and Grigore Alexandrescu — and Cotroceni is not among Bucharest's identified pollution hotspots, with its extensive tree canopy and the 1…
      nature: The Dimitrie Brândză Botanical Garden — 17 hectares with ~10,000 plant species, open to the public and well-maintained — sits within Cotroceni, a 10-minute walk from most of the neighborhood, complemented by mature tree-lined streets and the nearby 30-hectare Carol I Park. Bucharest overall provi…
    sources: [ "OECD PISA 2022 Romania", "SonarHome Cotroceni", "bellemonde.ro areas guide", "Numbeo Bucharest safety", "Transparency CPI 2024", "Xe RON/EUR June 2026", "Wizz Air OTP-EVN" ]
