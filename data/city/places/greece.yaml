    notes:
      education: Glyfada offers shrinking public class sizes, a newly renovated 3rd Primary, and Verita International School's British-curriculum bilingual programme through Senior High — but there is no IB school anywhere in the southern suburbs (nearest IB programs are a 25+ min drive to Halandri/Psychico), Gre…
      safe_independence: A new municipal traffic-education park and a 3.5 km coastal cycle path are bright spots, and the Numbeo safety index is 90/100 — but Greece's pedestrian fatality rate is double Western Europe's, only 14% of elementary children walk to school independently, Glyfada's tram to central Athens takes 5…
      mental_health: Greece's adult suicide rate (4.6 per 100,000) is among the lowest in the EU, a nationwide school phone ban and anti-cyberbullying rules took effect in 2024, and the CAMHI initiative has strengthened youth mental-health infrastructure — yet only 32% of Greek adolescents report high life satisfacti…
      peer_environment: Glyfada is Athens' most expensive suburb with 19 well-equipped playgrounds, ANO Glyfada's strong water-sports club, and affluent international families drawn by Verita School and Golden Visas — but the Minister of Citizen Protection publicly named Glyfada a 'great problem' for youth delinquency w…
      family_practicality: Glyfada has a Montessori daycare through age 12, a bilingual nursery (€4,100/yr), tram lines T3/T5 plus the Elliniko M2 metro within a bus ride, and Greece's rapidly digitizing public services (OECD Digital Government rank 14th of 36) — but the tram+bus+metro commute to central Athens runs 45–70+…
      health: Current PM2.5 readings in Glyfada are 6–11 µg/m³ (Good–Moderate), Asklepieio Voulas General Hospital with an emergency department is ~5 km away, and all three Glyfada beaches hold Blue Flag certification with municipality-funded lifeguards until 8 pm — but Athens' annual PM2.5 average is 14.7 µg/…
      nature: Glyfada sits directly on the Saronic Gulf with three Blue Flag beaches, lifeguards on duty 8 am–8 pm, and 19 modern playgrounds across all neighbourhoods; Mount Hymettus Aesthetic Forest borders the district to the east and the 53-hectare Glyfada Golf Club provides a large green lung — but the ar…
    sources: [ "Greek City Times/Spitogatos Glyfada 2025", "St Lawrence College / Byron College", "OECD PISA 2022 Greece", "Numbeo Crime", "Athens Tram T6" ]
