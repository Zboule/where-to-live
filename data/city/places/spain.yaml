      health: Sant Joan de Déu — Catalonia's top paediatric hospital with a dedicated A&E — is a 10–15 minute drive away, and Barcelona's NO₂ pollution dropped 14% in 2025 to decade-best levels, but all seven city monitoring stations still exceed the WHO PM₂.₅ guideline of 5 µg/m³ with levels stable since 2013…
