      nature: Over half of Nordstrand is vegetated (51% cover), nearly a third is regulated green space, and it borders the newly designated Østmarka National Park to the east while offering multiple beaches with Excellent EU water-quality ratings including the upgraded Nordstrand bad with its diving board and…
