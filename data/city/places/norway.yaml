      family_practicality: Norway's Altinn digital portal handles 700+ public services digitally and universal barnehage/SFO programmes provide high-quality childcare, while the Bybanen light rail connects Fana to Bergen centre with Lagunen Storsenter nearby for everyday shopping. Newcomer onboarding is hampered by a circu…
      health: "Norway tied #1 globally on the Yale EPI for drinking water with a perfect score, 99.2% of municipal water meets hygienic standards, and Haukeland University Hospital in Bergen provides high-quality paediatric and emergency care. Long-term concerns centre on aging water infrastructure (~30% of dri…"
