# REAL ESTATE · relocation_home · edinburgh — Edinburgh — Morningside/Bruntsfield, the COMFORTABLE size.
# ~230 m² Victorian stone family house in the Morningside/Bruntsfield belt (Boroughmuir & James Gillespie's
# catchments — the best state-school belt in Scotland). Bought AT the (dynamic) move; OFF by default, a relocation
# scenario turns it on and the "Home size" toggle picks the tier. Price fact-checked 2025-26: Morningside average
# house price ~£489k (all types, ESPC/PMI — flats drag that down), EH10 average transaction ~£530k; whole Victorian
# houses in Morningside/Merchiston run ~£4,200–5,500/m² (ESPC, Savills EH10). A ~230 m² comfortable Victorian
# semi/terrace ≈ £5,200/m². The engine projects this price (and the LTV-scaled mortgage) to the actual purchase
# year, so a later move buys at the appreciated price, not today's. GBP 1.20M.
