# REAL ESTATE · relocation_home · copenhagen — Copenhagen — Frederiksberg (green enclave, best schools), the COMFORTABLE size.
# ~230 m² 4–5 bed family villa/large apartment. Bought AT the (dynamic) move; OFF by default, a relocation scenario
# turns it on and the "Home size" toggle picks the tier. Price fact-checked 2026 (Boliga/Boligsiden/Finans Danmark):
# Frederiksberg is Denmark's most expensive municipality — realized apartment prices ~DKK 80,479/m² (Q1 2026),
# villas/rækkehuse ~DKK 85,967/m² (asking spread ~59k–131k/m²). A ~230 m² quality family home ≈ DKK 80,000/m².
# NOTE: this is ABOVE the older DKK 55–75k/m² band — 2025-26 prices set new records. The engine projects this price
# (and the LTV-scaled mortgage) to the actual purchase year, so a later move buys at the appreciated price, not today's. DKK 18.4M.
