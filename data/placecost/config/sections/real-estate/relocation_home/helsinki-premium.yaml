# REAL ESTATE · relocation_home · helsinki-premium — Helsinki — Munkkiniemi (leafy, sea, good schools), the PREMIUM size.
# ~350 m² large high-spec sea-side home (townhouse/villa, often still asunto-osakeyhtiö shares). Bought AT the
# (dynamic) move; OFF by default, a relocation scenario turns it on and the "Home size" toggle picks the tier.
# Price fact-checked 2025-26 (asuntojenhinnat.fi / Kiinteistömaailma): Munkkiniemi area average ~€7,400/m² with
# prime renovated/sea-view stock at the top of the €7,000–9,000 band; a ~350 m² top home ≈ €9,000/m².
# The engine projects this price (and the LTV-scaled mortgage) to the actual purchase year, so a later move buys
# at the appreciated price, not today's. EUR 3.15M.
