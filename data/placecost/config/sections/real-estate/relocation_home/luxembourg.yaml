# REAL ESTATE · relocation_home · luxembourg — Luxembourg City — Belair, the COMFORTABLE size.
# ~230 m² 4–5 bed family house in the leafy embassy quarter (walk to Parc de Merl / city park + European School).
# Bought AT the (dynamic) move; OFF by default, a relocation scenario turns it on and the "Home size" toggle picks
# the tier. Price fact-checked 2026: Belair is Luxembourg City's most expensive district — asking ~€12,500/m²
# (Immotop/atHome May-2026: €12,516/m² avg, quality stock ~€11,000–13,500/m²; Observatoire de l'Habitat/LISER
# confirms Belair at the top of the capital). Large houses trade slightly under the small-apartment €/m², so a
# ~230 m² comfortable house ≈ €12,000/m². The engine projects this price (and the LTV-scaled mortgage) to the
# actual purchase year, so a later move buys at the appreciated price, not today's. EUR 2.75M.
# Acquisition: droits d'enregistrement + transcription = 7% (€192,500) MINUS the Bëllegen Akt tax credit
# (€40,000 per buyer → €80,000 for a couple on a primary residence) + notary ~€25,000 → net ≈ €137,500 ≈ 5.0%.
# Holding: Luxembourg property tax (impôt foncier) is famously negligible — a few hundred €/yr even after the
# post-2026 reform noises; maintenance dominates. Sale: primary residence fully CGT-exempt; agency ~3% + VAT
# customarily paid by the seller.
