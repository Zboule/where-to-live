# EXPENSES · destination_living · madrid — the COMFORTABLE post-move life in
# Madrid — El Viso (Chamartín), Spain.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, public/concertado school + richer kids' activities.
# Employed family is in the Seguridad Social public system (payroll-funded) → the cash line is out-of-pocket +
# an Adeslas/Sanitas-style private top-up (~€250/mo for four, common in El Viso). Madrid domestic help ~€12–14/hr.
# Education: the two kids attend a mid-tier international/bilingual school (British Council-style / upper-tier
# concertado-bilingüe), ~€11k/child → ~€22k/yr for two — a solid school, not the priciest flagship.
# ~86400 EUR/yr (~7200 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Madrid, INE, idealista/expat cost surveys, CRM Comunidad de Madrid (concertado quotas).
