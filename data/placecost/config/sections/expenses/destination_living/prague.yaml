# EXPENSES · destination_living · prague — the COMFORTABLE post-move life in
# Prague — Vinohrady (Praha 2), Czechia. ALL AMOUNTS IN CZK.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, INTERNATIONAL school + rich kids' activities.
# Employed family on Czech public health insurance (payroll-funded, kids covered) → cash line is out-of-pocket + private-clinic (Canadian Medical/Program H+) top-ups. Cleaning ~CZK 250–350/hr.
# THE BIG LINE IS SCHOOL: two kids at a mid-tier international (e.g. Park Lane ~CZK 425k/child/yr blending primary/secondary,
# NOT the CZK 0.9–1.3M top-tier ISP/PBIS flagship) ≈ CZK 850k/yr total. Everything else is markedly cheaper than Western Europe.
# ~1999000 CZK/yr (~166,600 CZK/mo, ≈ EUR 81k) excl. housing.
# Fact-checked 2026: Numbeo Prague, Czech Statistical Office, ERU energy tariffs, international-school fee schedules.
