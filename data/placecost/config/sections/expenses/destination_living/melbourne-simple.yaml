# EXPENSES · destination_living · melbourne-simple — the SIMPLE post-move life in
# Melbourne — Camberwell (Boroondara), Australia.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# council rates or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car + Myki,
# NO cleaner (DIY), occasional eating out, one long-haul Europe trip every other year + domestic breaks,
# mid-tier private school (2 kids) + normal kids' activities.
# Health = Medicare (tax-funded) + a basic private hospital cover kept mainly to avoid the Medicare Levy
# Surcharge at higher incomes, + modest gap/dental out-of-pocket.
# Education: mid-tier independent school (e.g. Camberwell Girls / Siena tier ~AUD 31k/child/yr, NOT the
# AUD 42–55k elite tier) for TWO kids ≈ AUD 62k/yr.
# ~123800 AUD/yr (~10,320 AUD/mo) excl. housing.
# Fact-checked 2026: Numbeo Melbourne, ABS Household Expenditure, PHI comparison sites, RACV car running
# costs, PTV Myki fares.
