# EXPENSES · destination_living · porto — the COMFORTABLE post-move life in
# Porto — Foz do Douro, Portugal.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, private/international school + richer kids' activities.
# Expat family goes private on health: Multicare/Médis family plan ~€200/mo + out-of-pocket on top of SNS. Porto domestic help ~€7–9/hr.
# Education is the big PT-specific line: an expat family in Foz very likely goes private/international — CLIP
# (Oporto International School, Aldoar) is the local default → a mid-tier international school (CLIP/OBS mid band),
# ~€13k/child → ~€26k/yr for two — solid, not the priciest flagship (CLIP/OBS top ~€15k/child in secondary).
# ~71700 EUR/yr (~5980 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Porto, INE, ERSE, ACP, CLIP fee schedule.
