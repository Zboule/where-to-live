# EXPENSES · destination_living · amersfoort — the COMFORTABLE post-move life in
# Amersfoort, Netherlands.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, mid-tier international school (2 kids) + richer kids' activities.
# Amersfoort is a smaller city ~30km from the Randstad → ~8–10% cheaper day-to-day than Amsterdam (groceries,
# cleaning, eating out, discretionary), while the NATIONAL lines (health, education/BSO net of kinderopvangtoeslag,
# telecoms) are unchanged. NL cleaning ~€16–20/hr (often informal); kids under 18 free on basic health insurance.
# Education: mid-tier international/bilingual school (~€21k/child/yr, slightly below Amsterdam) for TWO kids ≈ €42k/yr.
# ~110300 EUR/yr (~9190 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo (Randstad), Nibud, Milieu Centraal, ANWB autokosten, Zorgwijzer 2026, Belastingdienst (BSO/kinderopvangtoeslag).
