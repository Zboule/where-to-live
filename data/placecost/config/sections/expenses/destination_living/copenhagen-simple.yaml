# EXPENSES · destination_living · copenhagen-simple — the SIMPLE post-move life in
# Copenhagen — Frederiksberg (green enclave, best schools), Denmark.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one small/older car
# (Danish registreringsafgift makes cars brutal — bikes/cargo-bike + metro carry most trips), essentially no
# domestic help (cleaning ~DKK 250/hr — Danes do it themselves), occasional eating out, one main holiday + a few
# weekends, mid-tier international school (2 kids) + normal kids' activities.
# Healthcare is essentially free (tax-funded) → the cash line is dental/glasses out-of-pocket only.
# ~564200 DKK/yr (~47000 DKK/mo) excl. housing.
# Fact-checked 2026: Numbeo Copenhagen, Danmarks Statistik, FDM (car costs), Forbrugerrådet Tænk.
