# EXPENSES · destination_living · bologna-simple — the SIMPLE post-move life in
# Bologna — Santo Stefano / Murri-Colli, Italy.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car (the ZTL makes carless-ish living easy in Bologna), a few hours/week of cleaning help, occasional eating out, one main holiday + a few weekends, public liceo + normal kids' activities.
# Family is on the SSN (national health, payroll/tax-funded) → the cash line is ticket co-pays + the odd private visit. Bologna domestic help ~€10–12/hr.
# Education: the two kids attend the International School of Bologna (private/international regardless of preset) —
# a blended mid-tier ~€12.5k/child (early grades + sibling discount) → ~€25k/yr for two.
# ~58800 EUR/yr (~4900 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Bologna, ISTAT, ARERA (energy), ACI (cars), Comune di Bologna.
