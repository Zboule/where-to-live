# EXPENSES · destination_living · utrecht-simple — the SIMPLE post-move life in
# Utrecht — Oost / Wittevrouwen, Netherlands.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car, a few hours/week of cleaning help, occasional eating out, one main holiday + a few weekends, mid-tier international school (2 kids) + normal kids' activities.
# Utrecht ≈ Amsterdam — a touch cheaper on groceries/cleaning/eating out, same national lines (health, education/BSO,
# telecoms). NL cleaning ~€16–20/hr (often informal). Children under 18 are free on the basic health insurance;
# the 2 adults' mandatory premiums + own-risk dominate the health line.
# Education: mid-tier international/bilingual school (Utrecht ≈ Amsterdam, ~€22k/child/yr private tier, NOT the subsidised ISU) for TWO kids ≈ €44k/yr.
# ~82600 EUR/yr (~6880 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Utrecht, Nibud, Milieu Centraal, ANWB autokosten, Zorgwijzer 2026, Belastingdienst (BSO/kinderopvangtoeslag).
