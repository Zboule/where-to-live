# EXPENSES · destination_living · edinburgh-simple — the SIMPLE post-move life in
# Edinburgh — Morningside/Bruntsfield, Scotland. ALL amounts in GBP.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# council tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal Edinburgh family of four genuinely spends: one modest car +
# Lothian buses, occasional cleaning help (~£15–18/hr), occasional eating out, one main holiday + a few weekends,
# mid-tier private day school + normal kids' activities.
# Healthcare is NHS ≈ free; the cash line is dental/optical.
# Energy note: Victorian stone houses leak heat — gas/electric runs well above a modern build.
# Education: mid-tier private day school (e.g. George Watson's / ESMS ~£16.5k/child/yr) for TWO kids ≈ £33k/yr.
# ~66000 GBP/yr (~5500 GBP/mo) excl. housing.
# Fact-checked 2026: Numbeo Edinburgh, ONS family spending, Ofgem price cap, Lothian Buses fares, George Watson's
# College fee schedule 2026 (£12,888–19,990/yr).
