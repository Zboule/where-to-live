# EXPENSES · destination_living · porto-simple — the SIMPLE post-move life in
# Porto — Foz do Douro, Portugal.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car, a few hours/week of cleaning help, occasional eating out, one main holiday + a few weekends, modest private school + normal kids' activities.
# Family keeps a basic Multicare/Médis top-up on SNS (public health) + out-of-pocket. Porto domestic help ~€7–9/hr.
# Education: the two kids attend a mid-tier international school (CLIP/OBS mid band, private/international
# regardless of preset), ~€13k/child → ~€26k/yr for two.
# ~56800 EUR/yr (~4730 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Porto, INE, ERSE, ACP, colégio fee schedules.
