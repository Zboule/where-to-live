# EXPENSES · destination_living · ljubljana — the COMFORTABLE post-move life in
# Ljubljana — Rožna dolina / Trnovo, Slovenia.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, mid-tier international school (2 kids) + richer kids' activities.
# Employed family is on ZZZS statutory health (payroll-funded) + dopolnilno (complementary) insurance
# ~€40/mo/adult → the cash line is dopolnilno + out-of-pocket/private specialists. Ljubljana cleaning ~€10–12/hr.
# Education: British International School of Ljubljana ~€15k/child/yr → TWO kids ≈ €30k/yr (the thin international
# scene means this is the mid-tier option).
# ~77500 EUR/yr (~6460 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Ljubljana, SURS, ZZZS/Vzajemna (dopolnilno), AMZS, BISL fee schedule.
