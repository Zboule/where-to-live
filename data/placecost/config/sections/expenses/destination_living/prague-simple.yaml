# EXPENSES · destination_living · prague-simple — the SIMPLE post-move life in
# Prague — Vinohrady (Praha 2), Czechia. ALL AMOUNTS IN CZK.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car + Prague transit passes, a few hours/week of cleaning help, occasional eating out, one main holiday + a few weekends, mid-tier INTERNATIONAL school (2 kids) + normal kids' activities.
# Employed family on Czech public health insurance (payroll-funded, kids covered) → cash line is out-of-pocket only. Cleaning ~CZK 250–350/hr.
# Education: two kids at a mid-tier international (e.g. Park Lane ~CZK 425k/child/yr, NOT the CZK 0.9–1.3M ISP flagship) ≈ CZK 850k/yr total.
# ~1568000 CZK/yr (~130,700 CZK/mo, ≈ EUR 64k) excl. housing.
# Fact-checked 2026: Numbeo Prague, Czech Statistical Office, ERU energy tariffs, DPP transit fares.
