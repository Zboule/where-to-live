# EXPENSES · destination_living · luxembourg-simple — the SIMPLE post-move life in
# Luxembourg City — Belair, Luxembourg.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car, a few hours/week of cleaning help, occasional eating out, one main holiday + a few weekends, international/bilingual school (2 kids) + normal kids' activities.
# Employed family is on CNS statutory health (payroll-funded, ~88–100% reimbursement), kids covered → the cash line is out-of-pocket + a small mutuelle top-up. Luxembourg cleaning is expensive: ~€18–22/hr declared.
# Groceries are pricey (~120% of EU avg) but fuel is cheap and ALL public transport in Luxembourg is FREE
# (nationwide, since 2020), which makes the one-car life genuinely workable. Education ≈ FREE (public /
# European School is access-restricted). Education here prices a MID-TIER international/bilingual school (St George’s / ISL) for TWO children.
# ~78700 EUR/yr (~6560 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Luxembourg, STATEC, CNS, mobiliteit.lu (free transport), ACL.
