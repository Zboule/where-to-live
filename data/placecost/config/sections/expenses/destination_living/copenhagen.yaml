# EXPENSES · destination_living · copenhagen — the COMFORTABLE post-move life in
# Copenhagen — Frederiksberg (green enclave, best schools), Denmark.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: ONE car only (Danish registreringsafgift makes cars brutal — up to
# 150% tax on value; bikes/cargo-bike + metro are the real family transport), minimal domestic help (cleaning runs
# ~DKK 250/hr — most Danish families do without), several holidays a year, weekly eating out, mid-tier international school (2 kids).
# Healthcare is essentially free (tax-funded) → the cash line is dental (not covered for adults), glasses and
# small private top-ups only.
# Education: mid-tier international/bilingual school (Copenhagen International School tier) for TWO children
# ~DKK 145,000/kid/yr × 2 ≈ DKK 290,000/yr (public folkeskole is free; this is the international-school choice).
# ~761600 DKK/yr (~63500 DKK/mo) excl. housing.
# Fact-checked 2026: Numbeo Copenhagen, Danmarks Statistik, FDM (car costs), Forbrugerrådet Tænk, friskole fee ranges.
