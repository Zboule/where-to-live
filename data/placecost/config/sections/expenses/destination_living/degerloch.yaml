# EXPENSES · destination_living · degerloch — the COMFORTABLE post-move life in
# Degerloch (Stuttgart, Germany).
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, mid-tier international school (2 kids) + richer kids' activities.
# Employed family on GKV statutory health (payroll-funded); spouse + kids co-insured free → cash line is co-pays + an optional dental/Zusatz supplement. (PKV private would run €15–18k/yr — not assumed.) Cleaning ~€15–20/hr.
# ~109600 EUR/yr (~9130 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Stuttgart, Destatis, Heizspiegel/Stromspiegel, ADAC, TK/GKV, Stadt Stuttgart fees.
