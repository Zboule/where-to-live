# EXPENSES · destination_living · melbourne — the COMFORTABLE post-move life in
# Melbourne — Camberwell (Boroondara), Australia.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# council rates or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars + Myki transit, an occasional cleaner (~AUD 40/hr),
# several holidays a year incl. one long-haul Europe trip (long-haul from Melbourne is EXPENSIVE), one–two
# casual restaurant/café meals a week, mid-tier private school (2 kids) + richer kids' activities.
# Health = Medicare (tax-funded) + private hospital & extras cover for a family ~AUD 6–7k/yr (also avoids the
# Medicare Levy Surcharge at higher incomes) + gap/dental/optical out-of-pocket.
# Education: mid-tier independent school (e.g. Camberwell Girls / Siena tier ~AUD 31k/child/yr, NOT the
# AUD 42–55k elite Geelong-Grammar tier) for TWO kids ≈ AUD 62k/yr.
# ~172000 AUD/yr (~14,330 AUD/mo) excl. housing.
# Fact-checked 2026: Numbeo Melbourne, ABS Household Expenditure, PHI comparison sites (iSelect/Compare the
# Market), RACV car running costs, PTV Myki fares.
