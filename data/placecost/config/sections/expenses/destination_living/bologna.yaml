# EXPENSES · destination_living · bologna — the COMFORTABLE post-move life in
# Bologna — Santo Stefano / Murri-Colli, Italy.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars (ZTL limits centro driving — note), a part-time maid (~1–2 days/week), several holidays a year, one–two restaurant meals a week (Bologna la Grassa deserves it), public liceo + richer kids' activities.
# Family is on the SSN (national health, payroll/tax-funded) → the cash line is ticket co-pays + private specialist visits. Bologna domestic help ~€10–12/hr.
# Education: the two kids attend the International School of Bologna (the local int'l default) — a blended mid-tier
# ~€12.5k/child (reception/early-primary + sibling discount; primary proper runs ~€17.5k) → ~€25k/yr for two.
# ~85200 EUR/yr (~7100 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Bologna, ISTAT, ARERA (energy), ACI (cars), Comune di Bologna.
