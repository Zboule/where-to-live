# EXPENSES · destination_living · ljubljana-simple — the SIMPLE post-move life in
# Ljubljana — Rožna dolina / Trnovo, Slovenia.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car, a few hours/week of cleaning help, occasional eating out, one main holiday + a few weekends, mid-tier international school (2 kids) + normal kids' activities.
# Employed family is on ZZZS statutory health (payroll-funded) + dopolnilno (complementary) insurance
# ~€40/mo/adult → the cash line is dopolnilno + modest out-of-pocket. Ljubljana cleaning ~€10–12/hr.
# Education: British International School of Ljubljana ~€15k/child/yr → TWO kids ≈ €30k/yr (the thin
# international scene means this is the mid-tier option).
# ~60700 EUR/yr (~5060 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Ljubljana, SURS, ZZZS/Vzajemna (dopolnilno), AMZS.
