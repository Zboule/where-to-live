# EXPENSES · destination_living · stockholm — the COMFORTABLE post-move life in
# Stockholm — Bromma (Ålsten/Höglandet), Sweden. ALL amounts in SEK.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: one car + SL cards, minimal domestic help (RUT-avdrag halves the cost
# of cleaning — ~SEK 250/hr gross → ~125 net), several holidays a year, weekly-ish restaurant meals, mid-tier international
# school (2 kids), richer kids' activities (hockey/riding/simskola).
# Healthcare is region-funded and near-free: patient fees are capped by högkostnadsskydd (~SEK 1,400/yr) — the cash
# line is dental + glasses + the odd private appointment.
# ~926000 SEK/yr (~77200 SEK/mo) excl. housing.
# Fact-checked 2026: Numbeo Stockholm, Konsumentverket referensvärden, SL (månadskort), Skatteverket (RUT, maxtaxa).
