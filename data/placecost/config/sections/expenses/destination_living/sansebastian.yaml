# EXPENSES · destination_living · sansebastian — the COMFORTABLE post-move life in
# San Sebastián / Donostia — Antiguo-Ondarreta, Spain.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, public/concertado school + richer kids' activities.
# Employed family is in the Seguridad Social public system (Osakidetza — one of Spain's best regional services)
# → the cash line is out-of-pocket + an Adeslas/IMQ-style private top-up (~€250/mo for four). Help ~€12–13/hr.
# Basque food culture pushes the grocery line UP (market/quality spend) while leisure prices sit a notch below
# Madrid. Education: the two kids attend a mid-tier private bilingual/international colegio (Summa Aldapeta-style),
# ~€8k/child → ~€16k/yr for two — a solid bilingual school, not the priciest flagship.
# ~79200 EUR/yr (~6600 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo San Sebastián, INE/Eustat, idealista, Gipuzkoa concertado quota surveys.
