# EXPENSES · destination_living · utrecht — the COMFORTABLE post-move life in
# Utrecht — Oost / Wittevrouwen, Netherlands.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, mid-tier international school (2 kids) + richer kids' activities.
# Utrecht ≈ Amsterdam on cost of living — very slightly cheaper (groceries, cleaning, eating out) but the same
# national lines (health, education/BSO net of kinderopvangtoeslag, telecoms). NL cleaning ~€16–20/hr (often
# informal). Children under 18 are free on the basic health insurance; the 2 adults' premiums + own-risk dominate health.
# Education: mid-tier international/bilingual school (Utrecht ≈ Amsterdam, ~€22k/child/yr private tier, NOT the subsidised ISU) for TWO kids ≈ €44k/yr.
# ~117600 EUR/yr (~9800 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Utrecht, Nibud, Milieu Centraal, ANWB autokosten, Zorgwijzer 2026, Belastingdienst (BSO/kinderopvangtoeslag).
