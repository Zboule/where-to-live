# EXPENSES · destination_living · default — the COMFORTABLE post-move life in
# the Amsterdam area (Watergraafsmeer / Amstelveen / Haarlem), Netherlands.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, mid-tier international school (2 kids) + richer kids' activities.
# NL cleaning ~€16–20/hr (often informal). Children under 18 are free on the basic health insurance; the 2 adults' mandatory premiums + own-risk dominate the health line.
# Education: mid-tier international/bilingual school (e.g. Amity Amsterdam ~€22k/child/yr, NOT the subsidised DENISE) for TWO kids ≈ €44k/yr.
# ~119600 EUR/yr (~9970 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Amsterdam, Nibud, Milieu Centraal, ANWB autokosten, Zorgwijzer 2026, Belastingdienst (BSO/kinderopvangtoeslag).
