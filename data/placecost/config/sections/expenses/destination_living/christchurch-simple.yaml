# EXPENSES · destination_living · christchurch-simple — the SIMPLE post-move life in
# Christchurch — Fendalton, New Zealand. ALL amounts in NZD.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# rates or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car (still needed — NZ is car country), the odd cleaning visit (~NZD 35–40/hr), occasional eating out, one main holiday (even a single Europe trip dominates the travel line) + Kiwi weekends away, mid-tier private school (2 kids) + normal kids' activities.
# Health: public system + basic Southern Cross cover + GP co-pays.
# Education: mid-tier private day school (e.g. St Margaret's / Christ's College ~NZD 27.5k/child/yr) for TWO kids ≈ NZD 55k/yr.
# ~112000 NZD/yr (~9330 NZD/mo) excl. housing.
# Fact-checked 2026: Numbeo Christchurch, Stats NZ HES, MBIE (power), AA NZ (cars), Southern Cross.
