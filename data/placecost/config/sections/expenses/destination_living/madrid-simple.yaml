# EXPENSES · destination_living · madrid-simple — the SIMPLE post-move life in
# Madrid — El Viso (Chamartín), Spain.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car, a few hours/week of cleaning help, occasional eating out, one main holiday + a few weekends, public school + normal kids' activities.
# Employed family is in the Seguridad Social public system (payroll-funded) → the cash line is out-of-pocket +
# a slimmer private top-up. Madrid domestic help ~€12–14/hr. Education: the two kids attend a mid-tier
# international/bilingual school (private/international regardless of preset), ~€11k/child → ~€22k/yr for two.
# ~59100 EUR/yr (~4930 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Madrid, INE, idealista/expat cost surveys, CRM Comunidad de Madrid (concertado quotas).
