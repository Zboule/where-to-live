# EXPENSES · destination_living · lisbon — the COMFORTABLE post-move life in
# Lisbon — Alvalade, Portugal.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, private/international school + richer kids' activities.
# Expat family goes private on health: Multicare/Médis family plan ~€200/mo + out-of-pocket on top of SNS. Lisbon domestic help ~€8–10/hr.
# Education is the big PT-specific line: an expat family very likely goes private/international (Alvalade is near
# St. Julian's/PaRK/Redbridge catchments) → a mid-tier international/bilingual colégio (Redbridge/PaRK/St. Julian's
# mid band), ~€14k/child → ~€28k/yr for two — solid, not the priciest flagship (St. Julian's tops €29k/child).
# ~79200 EUR/yr (~6600 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Lisbon, INE, ERSE, ACP, school fee schedules (St. Julian's, PaRK IS, Redbridge).
