# EXPENSES · destination_living · annecy-simple — the SIMPLE post-move life in
# Annecy-le-Vieux (Haute-Savoie, France).
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car, a few hours/week of cleaning help, occasional eating out, one main holiday + a few weekends, international/bilingual school (2 kids) + normal kids' activities.
# Strasbourg baseline with an alpine premium (~+8–12% groceries/utilities/help; winter sports lift activities). PUMA payroll-funded → mutuelle + out-of-pocket. CESU help net of the 50% crédit d'impôt.
# ~57500 EUR/yr (~4790 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Lyon/Strasbourg, INSEE, Selectra/CRE, Urssaf CESU 2026, Roole/Automobile Club.
