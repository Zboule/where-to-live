# EXPENSES · destination_living · sansebastian-simple — the SIMPLE post-move life in
# San Sebastián / Donostia — Antiguo-Ondarreta, Spain.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car, a few hours/week of cleaning help, occasional eating out, one main holiday + a few weekends, public school + normal kids' activities.
# Employed family is in the Seguridad Social public system (Osakidetza — one of Spain's best regional services)
# → the cash line is out-of-pocket + a slimmer private top-up. Help ~€12–13/hr. Compact walkable city keeps
# transport down; Basque grocery-quality spend stays a bit high even in the simple tier.
# Education: the two kids attend a mid-tier private bilingual/international colegio (Summa Aldapeta-style,
# private/international regardless of preset), ~€8k/child → ~€16k/yr for two.
# ~52800 EUR/yr (~4400 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo San Sebastián, INE/Eustat, idealista, Gipuzkoa concertado quota surveys.
