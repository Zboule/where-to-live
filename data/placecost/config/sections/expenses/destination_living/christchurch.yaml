# EXPENSES · destination_living · christchurch — the COMFORTABLE post-move life in
# Christchurch — Fendalton, New Zealand. ALL amounts in NZD.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# rates or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars (NZ is car country), an occasional cleaner (~NZD 35–40/hr), several holidays a year — long-haul to Europe is EXPENSIVE and gets its own weight in travel — one–two café/restaurant outings a week, mid-tier private school (2 kids) + rich kids' activities (rugby, ski at Mt Hutt, sailing).
# Health: public system + Southern Cross family cover ~NZD 3–4k/yr + GP co-pays.
# Education: mid-tier private day school (e.g. St Margaret's / Christ's College ~NZD 27.5k/child/yr) for TWO kids ≈ NZD 55k/yr.
# ~155800 NZD/yr (~12,980 NZD/mo) excl. housing.
# Fact-checked 2026: Numbeo Christchurch, Stats NZ HES, MBIE (power), AA NZ (cars), Southern Cross.
