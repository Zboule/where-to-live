# EXPENSES · destination_living · helsinki-simple — the SIMPLE post-move life in
# Helsinki — Munkkiniemi (leafy, sea, good schools), Finland.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here (the hoitovastike sits in the real-estate holding costs).
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car + HSL,
# essentially no domestic help, occasional eating out, one main holiday (a winter escape) + mökki-style weekends,
# mid-tier international school (2 kids) + normal kids' activities. Trims travel/restaurants/help vs the comfortable tier.
# Public healthcare ~free; the cash line is dental/out-of-pocket only. Utilities modest because heating/water
# are often inside the housing-company vastike.
# ~68900 EUR/yr (~5740 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Helsinki, Tilastokeskus (Statistics Finland), HSL fares, Autoliitto, Kela.
