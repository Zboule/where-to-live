# EXPENSES · destination_living · lisbon-simple — the SIMPLE post-move life in
# Lisbon — Alvalade, Portugal.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car, a few hours/week of cleaning help, occasional eating out, one main holiday + a few weekends, modest private school + normal kids' activities.
# Family keeps a basic Multicare/Médis top-up on SNS (public health) + out-of-pocket. Lisbon domestic help ~€8–10/hr.
# Education: the two kids attend a mid-tier international/bilingual school (Redbridge/PaRK/St. Julian's mid band,
# private/international regardless of preset), ~€14k/child → ~€28k/yr for two.
# ~61900 EUR/yr (~5160 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Lisbon, INE, ERSE, ACP, colégio fee schedules.
