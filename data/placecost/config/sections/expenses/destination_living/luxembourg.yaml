# EXPENSES · destination_living · luxembourg — the COMFORTABLE post-move life in
# Luxembourg City — Belair, Luxembourg.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, international/bilingual school (2 kids) + richer kids' activities.
# Employed family is on CNS statutory health (payroll-funded, ~88–100% reimbursement), kids covered → the cash line is out-of-pocket + a small mutuelle top-up. Luxembourg cleaning is expensive: ~€18–22/hr declared.
# Groceries are among the priciest in the euro area (~120% of EU avg); fuel is famously cheap and ALL public
# transport in Luxembourg is FREE (nationwide, since 2020) — so two cars carry the whole transport line.
# Education: the tuition-free European School (Lux I/II) is access-restricted, so this prices a MID-TIER international/bilingual school (e.g. St George’s / ISL) for TWO children.
# ~113400 EUR/yr (~9450 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Luxembourg, STATEC, CNS, mobiliteit.lu (free transport), ACL.
