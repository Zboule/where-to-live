# EXPENSES · destination_living · amersfoort-simple — the SIMPLE post-move life in
# Amersfoort, Netherlands.
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Simple: frugal-but-comfortable — what a normal local family of four genuinely spends: one modest car, a few hours/week of cleaning help, occasional eating out, one main holiday + a few weekends, mid-tier international school (2 kids) + normal kids' activities.
# Amersfoort is ~8–10% cheaper day-to-day than Amsterdam (groceries, cleaning, eating out, discretionary), while
# the NATIONAL lines (health, education/BSO, telecoms) are unchanged. NL cleaning ~€16–20/hr (often informal);
# kids under 18 free on basic health insurance; the 2 adults' mandatory premiums + own-risk dominate the health line.
# Education: mid-tier international/bilingual school (~€21k/child/yr, slightly below Amsterdam) for TWO kids ≈ €42k/yr.
# ~78000 EUR/yr (~6500 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo (Randstad), Nibud, Milieu Centraal, ANWB autokosten, Zorgwijzer 2026, Belastingdienst (BSO/kinderopvangtoeslag).
