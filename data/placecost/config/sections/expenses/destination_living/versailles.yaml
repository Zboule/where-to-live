# EXPENSES · destination_living · versailles — the COMFORTABLE post-move life in
# Versailles (Yvelines, Paris region, France).
# Researched bottom-up for a FAMILY OF FOUR (2 adults + 2 kids), 2026 — NOT the Abu Dhabi lifestyle re-priced.
# The family OWNS its home (relocation_home), so housing is excluded by design: no rent, mortgage,
# property tax or major maintenance here.
# Comfortable: comfortable but NOT luxurious: two cars, a part-time maid (~1–2 days/week), several holidays a year, one–two casual restaurant meals a week, international/bilingual school (2 kids) + richer kids' activities.
# Strasbourg baseline lifted for the Paris region (~+10–20% on local services: groceries, dining, help, school/childcare). PUMA payroll-funded → mutuelle + out-of-pocket. CESU help net of the 50% crédit d'impôt.
# ~90100 EUR/yr (~7510 EUR/mo) excl. housing.
# Fact-checked 2026: Numbeo Paris/Strasbourg, INSEE, Urssaf CESU 2026, Roole/Automobile Club, mutuelle tariffs.
